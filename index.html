<!DOCTYPE html>
<html lang="en" style="scroll-behavior: smooth;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PingMyDb | Keep Your Databases Awake</title>
    <meta name="description" content="PingMyDb prevents cold starts and monitors your database health with real-time alerts. Supporting PostgreSQL, MongoDB, and MySQL.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
      // Apply theme immediately to prevent flash
      (function() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || !savedTheme) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="PingMyDb" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; background: #020617; color: #fff;">
            <div style="text-align: center;">
                <div style="width: 40px; height: 40px; border: 3px solid #10b981; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem;"></div>
                <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
                <p style="font-size: 0.875rem; font-weight: 600; color: #94a3b8;">Initializing PingMyDb...</p>
            </div>
        </div>
    </div>
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
